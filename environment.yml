name: research-crew
channels:
  - conda-forge
  - defaults

dependencies:
  # Core Python
  - python=3.11
  - pip>=23.0

  # Data processing
  - pandas>=2.0.0
  - numpy>=1.24.0

  # Utilities
  - python-dotenv>=1.0.0
  - requests>=2.31.0
  - tqdm>=4.66.0

  # Install remaining packages via pip
  - pip:
    # CrewAI and agents
    - crewai>=0.28.0
    - crewai-tools>=0.1.0

    # PDF processing
    - pymupdf>=1.23.0

    # Vector store
    - chromadb>=0.4.0

    # Embeddings
    - openai>=1.0.0
    - google-generativeai>=0.3.0

    # Tokenization
    - tiktoken>=0.5.0

    # CLI and display
    - rich>=13.0.0
    - typer>=0.9.0

    # Testing
    - pytest>=7.0.0
    - pytest-asyncio>=0.21.0
